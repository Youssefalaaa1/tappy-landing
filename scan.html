<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tappy: Your loyalty cards, one tap away</title>
  <meta name="description" content="Collect and use loyalty cards from your favorite places. Tap, earn, and get rewarded with Tappy." />

  <!-- iOS Smart App Banner: shows a native "Open / View in App Store" bar.
       Replace 0000000000 with your numeric App Store ID once the app is live. -->
  <meta name="apple-itunes-app" content="app-id=0000000000, app-argument=https://REPLACE_DOMAIN/scan" />

  <!-- Open Graph (nice link previews when shared) -->
  <meta property="og:title" content="Tappy: Your loyalty cards, one tap away" />
  <meta property="og:description" content="Collect and use loyalty cards from your favorite places." />
  <meta property="og:type" content="website" />

  <style>
    :root {
      --brand: #6C47F5;
      --brand-2: #A855F7;
      --ink: #14121A;
      --muted: #6B6577;
      --bg: #F5F3EE;
      --card: #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #efeaff 0%, var(--bg) 55%);
      color: var(--ink);
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.5;
    }
    .wrap {
      width: 100%;
      max-width: 440px;
      text-align: center;
    }
    .logo-text {
      font-size: 42px; font-weight: 800; letter-spacing: -0.03em;
      color: var(--brand); margin: 0 auto 20px;
    }
    .invited {
      display: none;
      font-size: 13px; font-weight: 600;
      color: var(--brand);
      background: rgba(108,71,245,0.10);
      border: 1px solid rgba(108,71,245,0.20);
      padding: 7px 14px; border-radius: 999px;
      margin: 0 auto 18px; width: fit-content;
    }
    h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 10px; }
    .sub { font-size: 16px; color: var(--muted); margin-bottom: 30px; }
    .stores { display: flex; flex-direction: column; gap: 12px; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      text-decoration: none;
      padding: 16px 20px;
      border-radius: 16px;
      font-size: 16px; font-weight: 700;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--ink); color: #fff; box-shadow: 0 10px 24px -10px rgba(20,18,26,0.6); }
    .btn-secondary { background: var(--card); color: var(--ink); border: 1px solid #E6E2DB; }
    .btn svg { width: 22px; height: 22px; }
    .features {
      margin-top: 34px;
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px;
    }
    .feat { font-size: 12px; color: var(--muted); }
    .feat .emoji { display: block; font-size: 22px; margin-bottom: 6px; }
    .foot { margin-top: 36px; font-size: 12px; color: #A39DAE; }
    .foot a { color: var(--muted); }
    @media (max-width: 360px) { h1 { font-size: 26px; } }
  </style>
</head>
<body>
  <main class="wrap">
    <!-- Tappy wordmark (landing/logo.png); text wordmark fallback if it fails. -->
    <img id="brandLogo" src="logo.png" alt="Tappy"
         style="height:84px; width:84px; object-fit:contain; margin:0 auto 20px; display:block; border-radius:20px; box-shadow:0 14px 34px -12px rgba(108,71,245,0.4);"
         onerror="this.style.display='none'; document.getElementById('fallbackLogo').style.display='block';" />
    <div class="logo-text" id="fallbackLogo" style="display:none;">Tappy</div>

    <div class="invited" id="invited">🎁 You've been invited to collect a loyalty card</div>

    <h1>Get the Tappy app</h1>
    <p class="sub">Your loyalty cards from every favorite spot, collected and rewarded in one tap.</p>

    <div class="stores">
      <a class="btn btn-primary" id="iosBtn" href="#" rel="noopener">
        <svg viewBox="0 0 24 24" fill="#fff" aria-hidden="true">
          <path d="M17.05 12.04c-.03-2.6 2.13-3.85 2.22-3.91-1.21-1.77-3.1-2.01-3.77-2.04-1.6-.16-3.13.94-3.94.94-.81 0-2.07-.92-3.4-.9-1.75.03-3.36 1.02-4.26 2.58-1.82 3.16-.47 7.84 1.3 10.41.86 1.26 1.89 2.67 3.24 2.62 1.3-.05 1.79-.84 3.36-.84 1.57 0 2.01.84 3.39.81 1.4-.02 2.29-1.28 3.15-2.55.99-1.46 1.4-2.87 1.42-2.95-.03-.01-2.73-1.05-2.76-4.17z"/>
          <path d="M14.6 4.6c.72-.87 1.2-2.08 1.07-3.28-1.03.04-2.28.69-3.02 1.56-.66.77-1.24 2.01-1.1 3.19 1.12-.09 2.27-.56 2.99-1.47z"/>
        </svg>
        Download on the App Store
      </a>
      <a class="btn btn-secondary" id="androidBtn" href="#" rel="noopener">
        Get it on Google Play
      </a>
    </div>

    <div class="features">
      <div class="feat"><span class="emoji">📲</span>Tap to earn</div>
      <div class="feat"><span class="emoji">🎁</span>Auto rewards</div>
      <div class="feat"><span class="emoji">💳</span>One wallet</div>
    </div>

    <p class="foot">Already have it? <a href="#" id="openApp">Open in Tappy</a></p>
  </main>

  <script>
    // ─── CONFIG — replace these three values once the stores are live ────────────
    const CONFIG = {
      // App Store URL: apps.apple.com/app/idXXXXXXXXXX (available after App Store listing exists)
      iosUrl: "https://apps.apple.com/app/idREPLACE_APP_ID",
      // Google Play URL uses your package name (already known)
      androidUrl: "https://play.google.com/store/apps/details?id=com.youssefelgindy.tappy",
      // Your Universal Link domain (the page is served here). Used for the "Open in Tappy" deep link.
      appScheme: "tappy",
    };

    const iosBtn = document.getElementById('iosBtn');
    const androidBtn = document.getElementById('androidBtn');
    const openApp = document.getElementById('openApp');
    iosBtn.href = CONFIG.iosUrl;
    androidBtn.href = CONFIG.androidUrl;

    const ua = navigator.userAgent || navigator.vendor || "";
    const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    const isAndroid = /android/i.test(ua);

    // If this page was opened from a scan link, show the "invited" pill and keep
    // the params so "Open in Tappy" can hand them to the installed app.
    const qs = window.location.search; // e.g. ?bid=...&brid=...
    if (qs.includes('bid=')) {
      document.getElementById('invited').style.display = 'block';
    }

    // "Open in Tappy" tries the deep link (works only if the app is installed).
    openApp.addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = CONFIG.appScheme + "://scan" + qs;
    });

    // On a phone, surface the single most relevant store button by reordering.
    if (isAndroid) {
      androidBtn.parentNode.insertBefore(androidBtn, iosBtn);
    }
    // NOTE: we deliberately do NOT auto-redirect — Apple/Google dislike forced
    // redirects, and the smart app banner + clear buttons convert better.
  </script>
</body>
</html>
